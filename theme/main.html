<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ config.site_name }}</title>
  {{ meta_tags }}
  {{ extrahead }}

  <!-- Aquí se inserta el script de Snipcart -->
  <link rel="stylesheet" href="https://cdn.snipcart.com/themes/v3.0.31/default/snipcart.css" />
  <script async src="https://cdn.snipcart.com/themes/v3.0.31/default/snipcart.js"></script>
  <meta name="snipcart-api-key" content="NDFkNTE3ZjMtNDdmOS00Zjg3LWI0NDMtYjhhM2Y0NzVmOTdkNjM2Mzk2ODIzNjA1NzgzNzE4" />
</head>
<body>
  <header>
    {{ page.header }}
  </header>

  <main>
    {{ content }}
  </main>

  <!-- Aquí va el carrito de compras -->
  <div id="snipcart" data-config-modal-style="side"></div>

  <footer>
    {{ page.footer }}
  </footer>
</body>
</html>
