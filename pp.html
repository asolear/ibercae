<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Correo Electrónico</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        #emailDisplay {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 16px;
            color: #333;
        }
    </style>
</head>
<body>
    <div id="emailDisplay"></div>
    
    <h1>Registrarse</h1>
    <form id="emailForm">
        <label for="email">Correo Electrónico:</label>
        <input type="email" id="email" required>
        <br>
        <button type="submit">Registrarse</button>
    </form>
    <div id="message"></div>
    
    <script>

document.getElementById('emailForm').addEventListener('submit', function(event) {
    event.preventDefault();
    
    const email = document.getElementById('email').value;

    // Establecer una cookie para el correo electrónico registrado
    document.cookie = `registeredEmail=${encodeURIComponent(email)}; path=/; max-age=` + (60 * 60 * 24); // 1 día
    document.getElementById('message').innerText = "¡Correo electrónico registrado exitosamente!";

    // Mostrar el correo en la parte superior derecha
    displayEmail(email);
});

// Verificar el correo electrónico registrado al cargar la página
window.onload = function() {
    const cookies = document.cookie.split(';');
    const registeredEmail = cookies.find(cookie => cookie.trim().startsWith('registeredEmail='));

    if (registeredEmail) {
        const email = decodeURIComponent(registeredEmail.split('=')[1]);
        displayEmail(email);
    }
};

// Función para mostrar el correo en la parte superior derecha
function displayEmail(email) {
    const emailDisplay = document.getElementById('emailDisplay');
    emailDisplay.innerText = `Correo: ${email}`;
}

    </script>
</body>
</html>
