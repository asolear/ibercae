{% extends "base.html" %}

{% block extrahead %}
    {{ super() }}
    <script type="module" src="{{ base_url }}/js/pdfjs/pdfrenderizar.js"></script>
{% endblock %}

{% block content %}

<button id="registerButton">Registro</button>
<!-- <button id="registerButton" class="md-button md-button--primary">Registro</button> Botón con clases de estilo -->
<!-- <button id="registerButton" class="md-button md-button--primary" style="position: fixed; top: 50px; right: 20px;">Registro</button> -->

<div id="overlay"></div>
<div id="popup">
    <h2>Registro</h2>
    <form id="registerForm">
        <label for="email">Correo Electrónico:</label>
        <input type="email" id="email" required>

    <button id="closePopup" class="md-button" ><span style="color: red; ">✖</span>  
    </button></form>
</div>


{{ super() }} <!-- Para que continúe mostrando el contenido de la página actual -->
